*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;font-size:12px;background:#f1f5f9;color:#1e293b;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
/* ── HEADER ── */
.hdr{background:#0f172a;color:#e2e8f0;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-title{display:flex;flex-direction:column;}
.hdr-title h1{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#475569;}
.hdr-title h2{font-size:14px;font-weight:700;color:#f1f5f9;}
.hdr-actions{margin-left:auto;display:flex;gap:6px;align-items:center;}
.btn{padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-primary{background:#0d9488;color:#fff;} .btn-primary:hover{background:#0f766e;}
.btn-sec{background:#1e293b;color:#94a3b8;border:1px solid #334155;} .btn-sec:hover{background:#334155;}
.save-ok{font-size:10px;color:#0d9488;display:none;}
/* ── STATS ── */
.stats{background:#1e293b;padding:5px 14px;display:flex;gap:20px;font-size:10px;color:#64748b;flex-shrink:0;}
.stats strong{color:#0d9488;}
/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}
/* ── SIDEBAR ── */
.sidebar{width:210px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0;}
.order-hdr{background:#1e293b;color:#64748b;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;position:sticky;top:0;z-index:2;user-select:none;}
.order-hdr:hover{background:#334155;color:#94a3b8;}
.fam-item{padding:6px 10px 6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;border-bottom:1px solid #f8fafc;transition:background .1s;}
.fam-item:hover{background:#f1f5f9;}
.fam-item.active{background:#eff6ff;border-left:3px solid #1d4ed8;}
.fam-item.multi-sel{background:#fef3c7;border-left:3px solid #f59e0b;}
.fam-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-v{background:#0d9488;} .dot-m{background:#f59e0b;} .dot-e{background:#cbd5e1;}
.fam-name{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fam-count{font-size:9px;color:#94a3b8;}
/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:14px;min-width:0;}
/* Bulk bar */
.bulk-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.bulk-bar strong{font-size:12px;color:#b45309;}
.bulk-bar .btn{font-size:10px;padding:4px 10px;}
/* Cards */
.card{background:#fff;border-radius:9px;border:1px solid #e2e8f0;padding:14px 16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
.badge-v{background:#f0fdf4;color:#059669;} .badge-m{background:#fffbeb;color:#b45309;} .badge-e{background:#f8fafc;color:#94a3b8;}
.field-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
.field-label{font-size:10px;font-weight:700;color:#475569;min-width:150px;padding-top:5px;line-height:1.4;flex-shrink:0;}
.field-label small{display:block;font-weight:400;color:#94a3b8;font-size:9px;}
.field-wrap{flex:1;}
/* ── TRI-STATE BUTTONS ── */
.tri-opts{display:flex;flex-wrap:wrap;gap:4px;}
.topt{padding:4px 10px;border-radius:5px;border:1.5px solid;font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;user-select:none;}
.topt-neu{background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;}
.topt-inc{background:#0d9488;color:#fff;border-color:#0d9488;}
.topt-exc{background:#ef4444;color:#fff;border-color:#ef4444;}
.topt-neu:hover{border-color:#cbd5e1;color:#475569;}
.legend{display:flex;gap:10px;font-size:9px;color:#94a3b8;margin-bottom:8px;}
.legend span{display:flex;align-items:center;gap:3px;}
.leg-inc{color:#0d9488;font-weight:700;} .leg-exc{color:#ef4444;font-weight:700;} .leg-neu{color:#94a3b8;}

.trait-notes{width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:6px 9px;font-size:11px;color:#1e293b;min-height:50px;resize:vertical;}
.trait-notes:focus{outline:none;border-color:#60a5fa;}

.val-bar{display:flex;align-items:center;gap:10px;padding:10px 0 0;border-top:1px solid #f1f5f9;margin-top:4px;}
.val-bar label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;cursor:pointer;}
.val-bar input{width:14px;height:14px;accent-color:#0d9488;}
.sep{height:1px;background:#f1f5f9;margin:10px 0;}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:#94a3b8;}
.empty h3{font-size:14px;color:#475569;margin-bottom:6px;}

.photos-panel{width:520px;background:#fff;border-left:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.photos-hdr{background:#1e293b;color:#94a3b8;font-size:10px;font-weight:700;padding:8px 12px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.photos-hdr .sp-count{color:#0d9488;font-size:9px;margin-left:auto;}
.photos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;}
.sp-thumb{cursor:pointer;border-radius:6px;overflow:hidden;border:1px solid #e2e8f0;transition:all .12s;}
.sp-thumb:hover{border-color:#0d9488;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.sp-thumb img{width:100%;height:160px;object-fit:cover;display:block;}
.sp-thumb .sp-name{font-size:9px;font-style:italic;color:#475569;padding:3px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.load-sp-btn{margin:20px auto;display:block;padding:8px 16px;border-radius:7px;border:1.5px dashed #cbd5e1;background:transparent;color:#64748b;font-size:11px;cursor:pointer;text-align:center;}
.load-sp-btn:hover{border-color:#0d9488;color:#0d9488;}
.no-photo{font-size:10px;color:#94a3b8;text-align:center;padding:20px;}

.genus-item{padding:4px 10px 4px 26px;cursor:pointer;display:flex;align-items:center;gap:5px;border-bottom:1px solid #f8fafc;background:#f8fafc;transition:background .1s;}
.genus-item:hover{background:#eff6ff;}
.genus-item.gactive{background:#eff6ff;border-left:3px solid #6366f1;}
.genus-dot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;flex-shrink:0;}
.genus-dot.gdot-ov{background:#f59e0b;}
.genus-name{font-size:10px;font-style:italic;flex:1;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.expand-btn{font-size:10px;color:#94a3b8;background:none;border:none;cursor:pointer;padding:1px 5px;border-radius:3px;flex-shrink:0;line-height:1;}
.expand-btn:hover{background:#e2e8f0;color:#475569;}
.fam-genera-badge{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;margin-left:3px;flex-shrink:0;}
.genus-ctx{font-size:10px;color:#94a3b8;background:#f8fafc;border-radius:6px;padding:7px 10px;margin-bottom:10px;line-height:1.6;}
.genus-ctx b{color:#64748b;}
</style>

var state={}, selected=null, multiSel=new Set(), speciesDB=null;
var expandedFamilies=new Set(), selectedGenus=null, selectedGenusFam=null;

function getState(f){
  if(!state[f]){ state[f]=KNOWN[f] ? JSON.parse(JSON.stringify(KNOWN[f])) : {_validated:false,notes:'',structure:{},tentacules:{},pelagique:false,rhinophore:{},texture:{},cerates_dispo:{},cerates_forme:{},branchie_lat:false,extensions:{},taille:null}; if(!state[f]._validated) state[f]._validated=false; }
  /* Migration : injecter les champs KNOWN manquants dans les states anciens (localStorage) */
  if(KNOWN[f]){
    var s=state[f], k=KNOWN[f];
    if(!s.extensions||!Object.keys(s.extensions).length) s.extensions=JSON.parse(JSON.stringify(k.extensions||{}));
    if(k.cerates_forme&&Object.keys(k.cerates_forme).length===6&&(!s.cerates_forme||Object.keys(s.cerates_forme).length<6)) s.cerates_forme=JSON.parse(JSON.stringify(k.cerates_forme));
    if(k.rhinophore&&Object.keys(k.rhinophore).length===8&&(!s.rhinophore||Object.keys(s.rhinophore).length<8)) s.rhinophore=JSON.parse(JSON.stringify(k.rhinophore));
  }
  return state[f];
}
function saveStorage(){try{localStorage.setItem('ndx_traits3',JSON.stringify(state));}catch(e){} var el=document.getElementById('save-ok'); el.style.display='inline'; setTimeout(function(){el.style.display='none';},1400);}
function loadStorage(){try{var s=localStorage.getItem('ndx_traits3'); if(s) state=JSON.parse(s);}catch(e){}}

function getGenera(fam){
  var names={};
  var src=(PHOTOS_DB&&PHOTOS_DB[fam])||[];
  if(src.length) src.forEach(function(x){ var g=(x.n||'').split(' ')[0]; if(g) names[g]=true; });
  else if(speciesDB) speciesDB.filter(function(sp){return sp.f===fam&&sp.n;}).forEach(function(sp){ var g=sp.n.split(' ')[0]; if(g) names[g]=true; });
  return Object.keys(names).sort();
}
function hasGenusOverrides(fam){
  if(!state._genera) return false;
  return getGenera(fam).some(function(g){ return state._genera[g]; });
}
function getGenusState(genus){ if(!state._genera) state._genera={}; return state._genera[genus]||null; }

  var h='';
  Object.keys(orders).sort().forEach(function(o){
    h+='<div class="order-hdr" onclick="selectOrder(\''+o+'\')" title="Cliquer pour sélectionner toutes les familles de cet ordre"><span>'+o+'</span></div>';
    orders[o].forEach(function(d){
      var s=state[d.family]; var dotCls='dot-e';
      if(s&&s._validated) dotCls='dot-v'; else if(s&&s._modified) dotCls='dot-m';
      var isActive=selected===d.family&&!selectedGenus;
      var isMulti=multiSel.has(d.family)&&!isActive;
      var cls=(isActive?' active':isMulti?' multi-sel':'');
      var expanded=expandedFamilies.has(d.family);
      var hasOv=hasGenusOverrides(d.family);
      h+='<div class="fam-item'+cls+'" onclick="selectFam(\''+d.family+'\',event)">'
        +'<div class="fam-dot '+dotCls+'"></div>'

        +(hasOv?'<div class="fam-genera-badge" title="Overrides genre actifs"></div>':'')
        +'<div class="fam-count">'+d.n+'</div>'
        +'<button class="expand-btn" onclick="toggleExpand(\''+d.family+'\',event)" title="Genres">'+(expanded?'▴':'⊕')+'</button>'
        +'</div>';

            h+='<div class="genus-item'+(gActive?' gactive':'')+'" onclick="selectGenus(\''+esc(g)+'\',\''+esc(d.family)+'\',event)">'

function updateStats(){
  var v=0,m=0;
  FAMILY_DATA.forEach(function(d){var s=state[d.family]; if(s&&s._validated)v++;else if(s&&s._modified)m++;});
  document.getElementById('st-t').textContent=FAMILY_DATA.length;
  document.getElementById('st-v').textContent=v;
  document.getElementById('st-m').textContent=m;
  document.getElementById('st-e').textContent=FAMILY_DATA.length-v-m;
  var selInfo=document.getElementById('st-sel-info');
  if(multiSel.size>1){selInfo.style.display='inline';selInfo.textContent=multiSel.size+' familles sélectionnées';}
  else selInfo.style.display='none';
}
function selectFam(fam,evt){
  if(evt&&(evt.ctrlKey||evt.metaKey||evt.shiftKey)){
    if(multiSel.has(fam)) multiSel.delete(fam); else multiSel.add(fam);
    if(!multiSel.size) selected=fam;
  } else { selected=fam; multiSel.clear(); multiSel.add(fam); }
  selectedGenus=null; selectedGenusFam=null;
  getState(fam);
  renderSidebar(); renderEditor(); renderPhotos();
}
function selectOrder(o){
  multiSel.clear();
  FAMILY_DATA.filter(function(d){return d.order===o;}).forEach(function(d){ multiSel.add(d.family); getState(d.family); });
  selected=null;
  renderSidebar(); renderEditor(); renderPhotos();
}

function triBtn(label,stateVal,onclick){
  var cls=stateVal===1?'topt-inc':stateVal===2?'topt-exc':'topt-neu';
  var ico=stateVal===1?'✓ ':stateVal===2?'✗ ':'';
  return '<button class="topt '+cls+'" onclick="'+onclick+'" title="Clic : neutre → inclure → exclure">'+ico+esc(label)+'</button>';
}
function cycleObjField(stateKey,fieldObj,key){
  var s=getState(selected||Array.from(multiSel)[0]);
  var targets=multiSel.size>1?Array.from(multiSel):[selected];
  targets.forEach(function(f){
    var fs=getState(f); if(!fs[stateKey]) fs[stateKey]={};
    fs[stateKey][key]=((fs[stateKey][key]||0)+1)%3;
    fs._modified=true;
  });
  saveStorage(); renderSidebar(); renderEditor();
}
function setSimple(field,val){
  var targets=multiSel.size>1?Array.from(multiSel):[selected];
  targets.forEach(function(f){
    var fs=getState(f); fs[field]=(fs[field]===val)?null:val; fs._modified=true;
  });
  saveStorage(); renderSidebar(); renderEditor();
}
function setBool(field,val){
  var targets=multiSel.size>1?Array.from(multiSel):[selected];
  targets.forEach(function(f){
    var fs=getState(f); fs[field]=val; fs._modified=true;
  });
  saveStorage(); renderSidebar(); renderEditor();
}
function setNotes(v){ if(!selected) return; var s=getState(selected); s.notes=v; s._modified=true; saveStorage(); }
function setValidated(v){
  var targets=multiSel.size>1?Array.from(multiSel):[selected];
  targets.forEach(function(f){ var fs=getState(f); fs._validated=v; fs._modified=true; });
  saveStorage(); renderSidebar(); renderEditor();
}

function loadSpecies(){ document.getElementById('species-input').click(); }
function handleSpecies(evt){
  var file=evt.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){ try{ speciesDB=JSON.parse(e.target.result); renderPhotos(); }catch(ex){alert('Erreur JSON : '+ex.message);} };
  reader.readAsText(file);
  evt.target.value='';
}
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i]; arr[i]=arr[j]; arr[j]=t; }
  return arr;
}
function renderPhotos(){
  var wrap=document.getElementById('photos-grid-wrap');
  var cnt=document.getElementById('sp-count');
  var fam=selected||(Array.from(multiSel)[0]);

  /* Source : PHOTOS_DB injecté par pipeline (prioritaire) ou speciesDB chargé manuellement */
  var items=[];
  var spCount=0;
  if(PHOTOS_DB && typeof PHOTOS_DB === 'object' && !Array.isArray(PHOTOS_DB) && Object.keys(PHOTOS_DB).length>0) {
    if(!fam){ wrap.innerHTML='<div class="no-photo">Sélectionner une famille</div>'; cnt.textContent=''; return; }
    var famData=PHOTOS_DB[fam]||[];
    spCount=famData.length>0 ? new Set(famData.map(function(x){return x.n;})).size : 0;
    items=famData.map(function(x){ return {url:x.u,name:x.n,isFirst:x.f===1}; });
  } else if(speciesDB) {
    if(!fam){ wrap.innerHTML='<div class="no-photo">Sélectionner une famille</div>'; cnt.textContent=''; return; }
    speciesDB.filter(function(sp){ return sp.f===fam&&sp.p; }).forEach(function(sp){
      spCount++;
      var photos=Array.isArray(sp.p)?sp.p:[sp.p];
      photos.forEach(function(url,idx){ if(url) items.push({url:url,name:sp.n||sp.s||'',isFirst:idx===0}); });
    });
  } else {
    wrap.innerHTML='<button class="load-sp-btn" onclick="loadSpecies()">📁 Charger nudis_enriched.json<br>'
      +'<small style="color:#94a3b8;font-size:9px;">ou relancer python deploy.py pour injection auto</small></button>';
    cnt.textContent=''; return;
  }

  cnt.textContent=spCount+' sp.';
  if(!items.length){ wrap.innerHTML='<div class="no-photo">Aucune photo pour cette famille</div>'; return; }
  var pool=shuffle(items.slice()).slice(0,18);
  var h='<div class="photos-grid">';
  pool.forEach(function(item){
    h+='<div class="sp-thumb" title="'+esc(item.name)+'" onclick="window.open(\''+item.url+'\',\'_blank\')">'
      +'<img src="'+item.url+'" alt="'+esc(item.name)+'" loading="lazy" onerror="this.parentElement.style.display=\'none\'">'
      +'<div class="sp-name">'+(item.isFirst?'<b>':'<em>')+esc(item.name)+(item.isFirst?'</b>':'</em>')+'</div>'
      +'</div>';
  });
  h+='</div>'
    +'<div style="text-align:center;padding:4px 0 10px;">'
    +'<button style="font-size:9px;color:#94a3b8;background:none;border:none;cursor:pointer;" onclick="renderPhotos()">↺ Nouvelles photos aléatoires</button>'
    +'</div>';
  wrap.innerHTML=h;
}

/* ════════════════════════════════════
   EXPORT / IMPORT / RESET
   ════════════════════════════════════ */
function exportJSON(){
  var out={_version:'2.0',_generated:new Date().toISOString().slice(0,10),families:{}};
  FAMILY_DATA.forEach(function(d){
    var s=state[d.family]||KNOWN[d.family]||{};
    out.families[d.family]=Object.assign({},JSON.parse(JSON.stringify(s)),{_order:d.order,_n:d.n});
  });
  if(state._genera&&Object.keys(state._genera).length) out._genera=JSON.parse(JSON.stringify(state._genera));
  var blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='nudis_traits.json'; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function importJSON(){ document.getElementById('import-input').click(); }
function handleImport(evt){
  var file=evt.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var fams=data.families||data;
      Object.keys(fams).forEach(function(k){ state[k]=fams[k]; });
      saveStorage(); renderSidebar();
      if(selected) renderEditor();
      alert('Import OK : '+Object.keys(fams).length+' familles.');
    }catch(ex){alert('Erreur JSON : '+ex.message);}
  };
  reader.readAsText(file); evt.target.value='';
}
function resetFamily(){
  var targets=multiSel.size>1?Array.from(multiSel):[selected];
  if(!targets[0]) return;
  if(!confirm('Réinitialiser '+targets.length+' famille(s) aux valeurs Gosliner ?')) return;
  targets.forEach(function(f){ delete state[f]; getState(f); });
  saveStorage(); renderSidebar(); renderEditor();
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadStorage();
FAMILY_DATA.forEach(function(d){ if(!state[d.family]&&KNOWN[d.family]) state[d.family]=JSON.parse(JSON.stringify(KNOWN[d.family])); });
renderSidebar();
renderPhotos(); /* utilise PHOTOS_DB injecté si disponible */
